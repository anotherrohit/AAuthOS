# RadiantLogic realm + RFC 8693 token-exchange config for the demo.
#
# Three things are wired up here:
#   1. The `aauth` realm with one user (demo-user / demo-pass) and the
#      OIDC client for the supply-chain-ui frontend (PKCE, public client).
#   2. An external IdP entry pointed at the platform's aggregated JWKS
#      (https://registry-service.platform.svc.cluster.local:9000/v1/agents/jwks.json).
#      This is what lets RL validate AAuth-signed JWTs from registered agents.
#   3. The token-exchange grant config: accept
#      subject_token_type=urn:ietf:params:oauth:token-type:jwt, validate the
#      token's `iss` against the federated IdP, copy `mission_id` claim
#      through to the issued token, extend the `act` claim chain.
#
# The shape of this config is the same as the prior PoC at
# anotherrohit/spiffe-radiantlogic/manifests/radiantlogic/02-token-exchange-config.yaml
# — only the federated-IdP target differs (platform JWKS vs SPIRE OIDC discovery).

apiVersion: v1
kind: ConfigMap
metadata:
  name: radiantlogic-realm-config
  namespace: idp
data:
  realm.json: |
    {
      "realm": "aauth",
      "displayName": "AAuth Demo Realm",
      "enabled": true,
      "issuer": "https://radiantlogic.aauth.local/oauth2",
      "users": [
        {
          "username": "demo-user",
          "email": "demo-user@example.com",
          "credentials": [{ "type": "password", "value": "demo-pass" }]
        }
      ],
      "clients": [
        {
          "clientId": "supply-chain-ui",
          "publicClient": true,
          "redirectUris": ["http://localhost:3000/*"],
          "webOrigins": ["http://localhost:3000"],
          "standardFlowEnabled": true,
          "consentRequired": true,
          "consentText": "Allow agents to act on your behalf"
        },
        {
          "clientId": "platform-token-exchange",
          "publicClient": false,
          "serviceAccountsEnabled": true,
          "grantTypes": ["urn:ietf:params:oauth:grant-type:token-exchange"]
        }
      ],
      "federatedIdentities": [
        {
          "name": "aauth-platform-agents",
          "displayName": "AAuth Platform — registered agents",
          "type": "oidc",
          "issuer": "https://registry-service.platform.svc.cluster.local:9000",
          "jwksUri": "https://registry-service.platform.svc.cluster.local:9000/v1/agents/jwks.json",
          "subjectTokenTypeSupported": "urn:ietf:params:oauth:token-type:jwt"
        }
      ],
      "tokenExchange": {
        "enabled": true,
        "acceptedSubjectTokenTypes": [
          "urn:ietf:params:oauth:token-type:jwt"
        ],
        "issuedTokenType": "urn:ietf:params:oauth:token-type:access_token",
        "subjectMappings": [
          { "from": "subject_token.sub",        "to": "sub" },
          { "from": "subject_token.agent_id",   "to": "azp" },
          { "from": "subject_token.mission_id", "to": "mission_id" },
          { "from": "subject_token.act",        "to": "act",
            "appendCallerToActChain": true }
        ],
        "issuedTokenTtlSeconds": 300
      }
    }
