apiVersion: apps/v1
kind: Deployment
metadata:
  name: operator-console
  namespace: platform
  labels: { app: operator-console }
spec:
  replicas: 1
  selector: { matchLabels: { app: operator-console } }
  template:
    metadata:
      labels: { app: operator-console }
    spec:
      containers:
        - name: operator-console
          image: aauth/operator-console:dev
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 9002, name: http }
          env:
            - { name: PORT, value: "9002" }
          readinessProbe:
            httpGet: { path: /index.html, port: 9002 }
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: operator-console
  namespace: platform
spec:
  type: NodePort
  selector: { app: operator-console }
  ports:
    - { port: 9002, targetPort: 9002, nodePort: 30092, name: http }
---
# Bump CORS allowlist + operator creds on the platform services. Apply
# *after* 01-registry-service.yaml and 02-mission-service.yaml so this
# patches them in place.
apiVersion: v1
kind: ConfigMap
metadata:
  name: operator-auth
  namespace: platform
data:
  OPERATOR_USERNAME: operator
  OPERATOR_PASSWORD: aauth-operator-demo
  CORS_ORIGINS: "http://localhost:9002,http://127.0.0.1:9002"
