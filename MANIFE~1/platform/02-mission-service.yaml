apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mission-data
  namespace: platform
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: standard
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mission-service
  namespace: platform
  labels: { app: mission-service }
spec:
  replicas: 1
  selector:
    matchLabels: { app: mission-service }
  template:
    metadata:
      labels: { app: mission-service }
    spec:
      containers:
        - name: mission-service
          image: aauth/mission-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9001
              name: http
          envFrom:
            - configMapRef: { name: platform-config }
            - configMapRef: { name: operator-auth, optional: true }
          env:
            - name: MISSION_DB_PATH
              value: /data/missions.sqlite
            - name: MISSION_LISTEN_HOST
              value: "0.0.0.0"
            - name: MISSION_LISTEN_PORT
              value: "9001"
            - name: REGISTRY_URL
              value: http://registry-service.platform.svc.cluster.local:9000
            - name: GATEWAY_POLICY_URL
              value: http://agentgateway.gateway.svc.cluster.local:8080/admin/policy
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet: { path: /healthz, port: 9001 }
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mission-data
---
apiVersion: v1
kind: Service
metadata:
  name: mission-service
  namespace: platform
spec:
  type: NodePort
  selector: { app: mission-service }
  ports:
    - port: 9001
      targetPort: 9001
      nodePort: 30091
      name: http
