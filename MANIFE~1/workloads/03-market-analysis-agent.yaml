apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-analysis-agent
  namespace: apps
  labels: { app: market-analysis-agent, aauth.io/registered: "true" }
spec:
  replicas: 1
  selector: { matchLabels: { app: market-analysis-agent } }
  template:
    metadata:
      labels: { app: market-analysis-agent, aauth.io/registered: "true" }
    spec:
      containers:
        - name: market-analysis-agent
          image: aauth/market-analysis-agent:dev
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 9998, name: http }
          env:
            - name: AAUTH_BOOTSTRAP_TOKEN
              valueFrom:
                secretKeyRef: { name: market-analysis-aauth-bootstrap, key: token }
            - name: AAUTH_AGENT_ID_URL
              valueFrom:
                secretKeyRef: { name: market-analysis-aauth-bootstrap, key: id_url }
            - name: AAUTH_REGISTRY_URL
              value: http://registry-service.platform.svc.cluster.local:9000
            - name: AAUTH_GATEWAY_URL
              value: https://agentgateway.gateway.svc.cluster.local:8443
            - name: AAUTH_SIGNATURE_SCHEME
              value: jwks
            - name: AAUTH_KEY_STATE_DIR
              value: /tmp/aauth
            - name: MARKET_ANALYSIS_AGENT_PORT
              value: "9998"
            - name: MARKET_ANALYSIS_AGENT_URL
              value: http://market-analysis-agent.apps.svc.cluster.local:9998/
          envFrom:
            - configMapRef: { name: platform-config }
          readinessProbe:
            httpGet: { path: /healthz, port: 9998 }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: market-analysis-agent
  namespace: apps
spec:
  selector: { app: market-analysis-agent }
  ports:
    - { port: 9998, targetPort: 9998, name: http }
