apiVersion: apps/v1
kind: Deployment
metadata:
  name: supply-chain-ui
  namespace: apps
  labels: { app: supply-chain-ui }
spec:
  replicas: 1
  selector: { matchLabels: { app: supply-chain-ui } }
  template:
    metadata:
      labels: { app: supply-chain-ui }
    spec:
      containers:
        - name: supply-chain-ui
          image: aauth/supply-chain-ui:dev
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 3000, name: http }
          env:
            - name: REACT_APP_BACKEND_URL
              value: http://localhost:8000
            - name: REACT_APP_OIDC_AUTHORITY
              valueFrom:
                configMapKeyRef: { name: platform-config, key: IDP_ISSUER_URL }
            - name: REACT_APP_OIDC_CLIENT_ID
              value: supply-chain-ui
---
apiVersion: v1
kind: Service
metadata:
  name: supply-chain-ui
  namespace: apps
spec:
  type: NodePort
  selector: { app: supply-chain-ui }
  ports:
    - { port: 3000, targetPort: 3000, nodePort: 30000, name: http }
