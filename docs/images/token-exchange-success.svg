<svg viewBox="0 0 1000 660" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
<title>Successful RFC 8693 token exchange — terminal output</title>
<desc>A rendered terminal showing the output of make run after a successful end-to-end mission. Highlights the RFC 8693 token exchange at RadiantLogic where the supply-chain-agent successfully exchanges its inbound token for a downstream-audience token with the act chain extended to [backend, supply-chain]. The market-analysis-agent then verifies the inbound signature, returns 200, and the mission closes with state=completed.</desc>

<rect width="1000" height="660" rx="10" fill="#0f1419"/>
<rect width="1000" height="32" rx="10" fill="#1a1f29"/>
<rect y="22" width="1000" height="10" fill="#1a1f29"/>
<circle cx="20" cy="16" r="6" fill="#ff5f57"/>
<circle cx="40" cy="16" r="6" fill="#febc2e"/>
<circle cx="60" cy="16" r="6" fill="#28c840"/>
<text x="500" y="21" text-anchor="middle" font-size="12" fill="#7d8590">make run — aauth-mission-platform-demo</text>

<text x="20" y="60" font-size="12.5" fill="#7d8590">$ make run</text>
<text x="20" y="80" font-size="12.5" fill="#a3b1c2">==&gt; [07] Running end-to-end demo</text>
<text x="20" y="100" font-size="12.5" fill="#a3b1c2">==&gt; Submitting mission via backend</text>

<rect x="14" y="116" width="972" height="80" rx="6" fill="#0a4d3a" fill-opacity="0.35" stroke="#0a4d3a"/>
<text x="20" y="134" font-size="12" fill="#7ee787">mission-service  </text>
<text x="138" y="134" font-size="12" fill="#e6edf3">mission created       mission_id=8c7d2a1f-...  user=demo-user  originator=https://platform.aauth.local/agents/backend</text>
<text x="20" y="154" font-size="12" fill="#7ee787">backend          </text>
<text x="138" y="154" font-size="12" fill="#e6edf3">POST /v1/optimize     sku=WIDGET-1 region=us-east  mission_id=8c7d2a1f-...</text>
<text x="20" y="174" font-size="12" fill="#7ee787">backend          </text>
<text x="138" y="174" font-size="12" fill="#e6edf3">outbound A2A          target=supply-chain-agent  act=[backend]  signed=ed25519</text>
<text x="20" y="192" font-size="12" fill="#7d8590">                       └─ sig keyid="v1" alg="ed25519" content-digest=sha-256=:KqYZ...:</text>

<text x="20" y="216" font-size="12.5" fill="#a3b1c2">==&gt; Following the call as it hops:</text>

<rect x="14" y="226" width="972" height="186" rx="6" fill="#1a3a4a" fill-opacity="0.45" stroke="#1a3a4a"/>
<text x="20" y="246" font-size="12" fill="#79c0ff">supply-chain     </text>
<text x="138" y="246" font-size="12" fill="#e6edf3">inbound verified      from=https://platform.aauth.local/agents/backend  kid=v1</text>
<text x="20" y="264" font-size="12" fill="#79c0ff">supply-chain     </text>
<text x="138" y="264" font-size="12" fill="#e6edf3">requesting token-exchange at https://radiantlogic.idp.svc.cluster.local:8443/oauth2/token</text>
<text x="20" y="282" font-size="12" fill="#7d8590">                       audience=https://platform.aauth.local/agents/market-analysis</text>
<text x="20" y="300" font-size="12" fill="#7d8590">                       grant=urn:ietf:params:oauth:grant-type:token-exchange</text>

<rect x="138" y="312" width="848" height="60" rx="4" fill="#13251c" stroke="#2ea043"/>
<text x="148" y="330" font-size="11.5" fill="#7ee787">radiantlogic     </text>
<text x="266" y="330" font-size="11.5" fill="#e6edf3" font-weight="500">200 OK  · issued_token_type=...:access_token  · expires_in=300</text>
<text x="148" y="348" font-size="11" fill="#a3b1c2">sub=https://platform.aauth.local/agents/supply-chain</text>
<text x="148" y="364" font-size="11" fill="#a3b1c2">act=[backend, supply-chain]  mission_id=8c7d2a1f-...  jti=tx-9bff2c40-...</text>

<text x="20" y="392" font-size="12" fill="#79c0ff">supply-chain     </text>
<text x="138" y="392" font-size="12" fill="#e6edf3">outbound A2A          target=market-analysis-agent  act=[backend, supply-chain]  signed=ed25519</text>

<text x="20" y="416" font-size="12.5" fill="#a3b1c2">==&gt; Leaf accepted the call:</text>

<rect x="14" y="426" width="972" height="100" rx="6" fill="#1c1733" fill-opacity="0.45" stroke="#1c1733"/>
<text x="20" y="446" font-size="12" fill="#d2a8ff">market-analysis  </text>
<text x="138" y="446" font-size="12" fill="#e6edf3">inbound verified      from=https://platform.aauth.local/agents/supply-chain  kid=v1</text>
<text x="20" y="464" font-size="12" fill="#d2a8ff">market-analysis  </text>
<text x="138" y="464" font-size="12" fill="#e6edf3">mission_id matches active mission · token act-chain length=2 · gateway policy allow</text>
<text x="20" y="482" font-size="12" fill="#d2a8ff">market-analysis  </text>
<text x="138" y="482" font-size="12" fill="#e6edf3">analyze() → 200       result.demand_forecast=42.7  result.confidence=0.91</text>
<text x="20" y="502" font-size="12" fill="#7ee787">mission-service  </text>
<text x="138" y="502" font-size="12" fill="#e6edf3">hop logged            from=supply-chain → market-analysis  act=[backend, supply-chain]</text>
<text x="20" y="520" font-size="12" fill="#7ee787">mission-service  </text>
<text x="138" y="520" font-size="12" fill="#e6edf3">token logged          jti=tx-9bff2c40-...  audience=market-analysis  expires_at=+300s</text>

<text x="20" y="548" font-size="12.5" fill="#a3b1c2">==&gt; Backend closed the mission:</text>
<text x="20" y="568" font-size="12" fill="#7ee787">mission-service  </text>
<text x="138" y="568" font-size="12" fill="#e6edf3">mission state updated  mission_id=8c7d2a1f-...  state=completed  hops=2  duration_ms=487</text>

<rect x="14" y="586" width="972" height="60" rx="6" fill="#0c2c1a" stroke="#2ea043"/>
<text x="500" y="608" text-anchor="middle" font-size="13" fill="#7ee787" font-weight="500">RFC 8693 token exchange succeeded — agent workload authenticated end-to-end</text>
<text x="500" y="628" text-anchor="middle" font-size="11" fill="#a3b1c2">3 registered agents · 2 signed hops · act chain extended at each hop · mission closed in &lt; 500ms</text>
</svg>
