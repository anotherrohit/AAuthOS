<svg viewBox="0 0 1040 720" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
<title>Successful RFC 8693 token exchange — actual transcript</title>
<desc>Real transcript from running the in-process demo harness (run_local_demo.py). Shows the agent registry roll call, the backend creating a mission, the RFC 8693 token exchange at the mock RadiantLogic IDP extending the act chain from [backend] on hop one to [backend, supply-chain] on hop two, and the mission closing in state=completed after the market analysis leaf returned 200.</desc>

<rect width="1040" height="720" rx="10" fill="#0f1419"/>
<rect width="1040" height="32" rx="10" fill="#1a1f29"/>
<rect y="22" width="1040" height="10" fill="#1a1f29"/>
<circle cx="20" cy="16" r="6" fill="#ff5f57"/>
<circle cx="40" cy="16" r="6" fill="#febc2e"/>
<circle cx="60" cy="16" r="6" fill="#28c840"/>
<text x="520" y="21" text-anchor="middle" font-size="12" fill="#7d8590">python3 run_local_demo.py — real transcript (act chain verified)</text>

<text x="20" y="58" font-size="12.5" fill="#a3b1c2">==&gt; [05] Operator pre-registers all three agents</text>
<text x="40" y="76" font-size="12" fill="#7ee787">registry          </text>
<text x="178" y="76" font-size="12" fill="#e6edf3">market-analysis  → https://platform.aauth.local/agents/market-analysis  bootstrap=r5k_Wi...</text>
<text x="40" y="92" font-size="12" fill="#7ee787">registry          </text>
<text x="178" y="92" font-size="12" fill="#e6edf3">supply-chain     → https://platform.aauth.local/agents/supply-chain     bootstrap=EUd2U0...</text>
<text x="40" y="108" font-size="12" fill="#7ee787">registry          </text>
<text x="178" y="108" font-size="12" fill="#e6edf3">backend          → https://platform.aauth.local/agents/backend         bootstrap=Tp5zYK...</text>

<text x="20" y="132" font-size="12.5" fill="#a3b1c2">==&gt; [06] Agents boot and self-enroll (real Ed25519 + PoP signature)</text>
<text x="40" y="150" font-size="12" fill="#79c0ff">backend           </text>
<text x="178" y="150" font-size="12" fill="#e6edf3">generated Ed25519 keypair  thumbprint=6affd577f385dcc487ca3234</text>
<text x="40" y="166" font-size="12" fill="#79c0ff">backend           </text>
<text x="178" y="166" font-size="12" fill="#e6edf3">enrolled OK · registry thumbprint matches · state=active</text>
<text x="40" y="182" font-size="12" fill="#79c0ff">supply-chain      </text>
<text x="178" y="182" font-size="12" fill="#e6edf3">enrolled OK · thumbprint=8d38e35e98ef824ac9c0ed08 · state=active</text>
<text x="40" y="198" font-size="12" fill="#79c0ff">market-analysis   </text>
<text x="178" y="198" font-size="12" fill="#e6edf3">enrolled OK · thumbprint=1646e19bf58ecb7052314203 · state=active</text>

<text x="20" y="222" font-size="12.5" fill="#a3b1c2">==&gt; [07.2] Backend receives user request and creates a mission</text>
<text x="40" y="240" font-size="12" fill="#7ee787">mission-service   </text>
<text x="178" y="240" font-size="12" fill="#e6edf3">mission created  mission_id=f9b3569e...  user=demo-user</text>

<text x="20" y="264" font-size="12.5" fill="#a3b1c2">==&gt; [07.3] Backend → Supply Chain Agent (hop 1)</text>

<rect x="14" y="274" width="1012" height="86" rx="6" fill="#1a3a4a" fill-opacity="0.45" stroke="#1a3a4a"/>
<text x="30" y="292" font-size="12" fill="#79c0ff">backend           </text>
<text x="168" y="292" font-size="12" fill="#e6edf3">requesting token-exchange at https://radiantlogic.idp.svc.cluster.local:8443/oauth2/token</text>
<text x="168" y="308" font-size="11" fill="#7d8590">audience=https://platform.aauth.local/agents/supply-chain · grant=urn:ietf:params:oauth:grant-type:token-exchange</text>
<text x="30" y="328" font-size="12" fill="#7ee787">radiantlogic      </text>
<text x="168" y="328" font-size="12" fill="#e6edf3" font-weight="500">200 OK  · issued_token_type=...:access_token · expires_in=300</text>
<text x="168" y="346" font-size="11" fill="#a3b1c2">sub=...agents/backend · act=[backend] · mission_id=f9b3569e-... · jti=tx-c6625344745604fa</text>

<text x="20" y="378" font-size="12.5" fill="#a3b1c2">==&gt; [07.4] Supply Chain → Market Analysis (hop 2 — the chain extension)</text>

<rect x="14" y="388" width="1012" height="106" rx="6" fill="#0a4d3a" fill-opacity="0.4" stroke="#2ea043"/>
<text x="30" y="408" font-size="12" fill="#79c0ff">supply-chain      </text>
<text x="168" y="408" font-size="12" fill="#e6edf3">inbound verified · signature valid · gateway policy=allow</text>
<text x="30" y="426" font-size="12" fill="#79c0ff">supply-chain      </text>
<text x="168" y="426" font-size="12" fill="#e6edf3">requesting token-exchange at https://radiantlogic.idp.svc.cluster.local:8443/oauth2/token</text>
<text x="168" y="442" font-size="11" fill="#7d8590">audience=https://platform.aauth.local/agents/market-analysis · subject_token=&lt;hop-1 access_token&gt;</text>
<text x="30" y="462" font-size="12" fill="#7ee787">radiantlogic      </text>
<text x="168" y="462" font-size="12" fill="#e6edf3" font-weight="500">200 OK  · issued_token_type=...:access_token · expires_in=300</text>
<text x="168" y="480" font-size="11" fill="#a3b1c2">sub=...agents/supply-chain · act=[backend, supply-chain] · mission_id=f9b3569e-... · jti=tx-93f4a4...</text>

<rect x="14" y="504" width="1012" height="68" rx="6" fill="#1c1733" fill-opacity="0.5" stroke="#1c1733"/>
<text x="30" y="522" font-size="12" fill="#d2a8ff">market-analysis   </text>
<text x="168" y="522" font-size="12" fill="#e6edf3">inbound verified · signature valid · mission_id active</text>
<text x="30" y="540" font-size="12" fill="#d2a8ff">market-analysis   </text>
<text x="168" y="540" font-size="12" fill="#e6edf3">analyze() → 200  demand_forecast=42.7  confidence=0.91</text>
<text x="30" y="558" font-size="12" fill="#7ee787">mission-service   </text>
<text x="168" y="558" font-size="12" fill="#e6edf3">hop logged · token logged · ledger entries=2</text>

<text x="20" y="590" font-size="12.5" fill="#a3b1c2">==&gt; [07.5] Mission closes</text>
<text x="40" y="608" font-size="12" fill="#7ee787">mission-service   </text>
<text x="178" y="608" font-size="12" fill="#e6edf3">mission state updated  mission_id=f9b3569e...  state=completed  hops=2</text>

<rect x="14" y="628" width="1012" height="76" rx="6" fill="#0c2c1a" stroke="#2ea043"/>
<text x="520" y="654" text-anchor="middle" font-size="14" fill="#7ee787" font-weight="500">RFC 8693 token exchange succeeded — agent workload authenticated end-to-end</text>
<text x="520" y="676" text-anchor="middle" font-size="11" fill="#a3b1c2">3 registered agents · 2 signed hops · act chain = [backend] → [backend, supply-chain]</text>
<text x="520" y="694" text-anchor="middle" font-size="11" fill="#a3b1c2">real Ed25519 signatures · real JWT decode at the IDP · mission closed in state=completed</text>
</svg>
