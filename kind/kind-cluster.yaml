kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: aauth-demo
networking:
  ipFamily: ipv4
  apiServerAddress: "127.0.0.1"
nodes:
  - role: control-plane
     image: kindest/node:v1.35.0@sha256:452d707d4862f52530247495d180205e029056831160e22870e37e3f6c1ac31f
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # ingress-nginx http / https
      - { containerPort: 80,   hostPort: 80,   protocol: TCP }
      - { containerPort: 443,  hostPort: 443,  protocol: TCP }
      # frontend (supply-chain-ui) via NodePort
      - { containerPort: 30000, hostPort: 3000, protocol: TCP }
      # platform — registry-service
      - { containerPort: 30090, hostPort: 9000, protocol: TCP }
      # platform — mission-service
      - { containerPort: 30091, hostPort: 9001, protocol: TCP }
      # backend
      - { containerPort: 30080, hostPort: 8000, protocol: TCP }
      # IDP admin console (RadiantLogic / Keycloak — only one is up at a time)
      - { containerPort: 30808, hostPort: 8080, protocol: TCP }
      # agentgateway
      - { containerPort: 30443, hostPort: 8443, protocol: TCP }
  - role: worker
    image: kindest/node:v1.35.0@sha256:452d707d4862f52530247495d180205e029056831160e22870e37e3f6c1ac31f
  - role: worker
     image: kindest/node:v1.35.0@sha256:452d707d4862f52530247495d180205e029056831160e22870e37e3f6c1ac31f
